<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="90mm" height="50mm"
     viewBox="0 0 90 50">

  <!--
    Pieczatka: KOCIE OCZKA — by Basia
    Rozmiar: 90 x 50 mm | Kolor: fiolet #5B2D8E
    Druk: otworz w Inkscape -> Eksportuj PNG 300 dpi
    QR: zastap placeholder prawdziwym QR gdy bedzie URL strony
  -->

  <!-- ═══ OBRAMOWANIE ═══ -->
  <rect x="0.8" y="0.8" width="88.4" height="48.4" rx="3"
        fill="none" stroke="#5B2D8E" stroke-width="1.2"/>
  <rect x="2"   y="2"   width="86"   height="46"   rx="2.5"
        fill="none" stroke="#5B2D8E" stroke-width="0.4"/>

  <!-- ═══ BANER GÓRNY: pełna szerokość, y=2..17 ═══ -->

  <text x="8" y="13.5" font-size="4.5" fill="#5B2D8E" font-family="Arial, sans-serif">✦</text>
  <text x="82" y="13.5" font-size="4.5" fill="#5B2D8E" font-family="Arial, sans-serif" text-anchor="end">✦</text>

  <text x="45" y="14"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="10" font-weight="bold"
        fill="#5B2D8E" text-anchor="middle"
        textLength="65" lengthAdjust="spacingAndGlyphs">KOCIE OCZKA</text>

  <!-- Separator poziomy (podwójny) -->
  <line x1="2.5" y1="17.2" x2="87.5" y2="17.2" stroke="#5B2D8E" stroke-width="0.6"/>
  <line x1="2.5" y1="18.2" x2="87.5" y2="18.2" stroke="#5B2D8E" stroke-width="0.2"/>

  <!-- ═══ DOLNA CZĘŚĆ ═══ -->
  <!-- Strefy: Kot (x:2-34) | Tekst (x:34-66) | QR (x:66-88) -->

  <!-- Separator pionowy 1: kot / tekst -->
  <line x1="34" y1="18.5" x2="34" y2="47.5"
        stroke="#5B2D8E" stroke-width="0.4" stroke-dasharray="1.8,1"/>

  <!-- Separator pionowy 2: tekst / QR -->
  <line x1="66" y1="18.5" x2="66" y2="47.5"
        stroke="#5B2D8E" stroke-width="0.4" stroke-dasharray="1.8,1"/>

  <!-- ─── KOT (cx=17, cy=33.5, r=10) ─── -->

  <!-- Głowa -->
  <circle cx="17" cy="33.5" r="10"
          fill="none" stroke="#5B2D8E" stroke-width="0.8"/>

  <!-- Lewe ucho -->
  <polygon points="8.5,28 11,21.5 15.5,28" fill="#5B2D8E"/>
  <polygon points="9.8,27.5 11.5,23.5 14.2,27.5" fill="white"/>

  <!-- Prawe ucho -->
  <polygon points="18.5,28 22,21.5 25.5,28" fill="#5B2D8E"/>
  <polygon points="19.8,27.5 22.5,23.5 24.2,27.5" fill="white"/>

  <!-- Oczy — migdałkowe z pionową źrenicą -->
  <ellipse cx="13"  cy="32" rx="2.7" ry="2.5" fill="#5B2D8E"/>
  <ellipse cx="21"  cy="32" rx="2.7" ry="2.5" fill="#5B2D8E"/>
  <ellipse cx="13"  cy="32" rx="1.1" ry="2.1" fill="white"/>
  <ellipse cx="21"  cy="32" rx="1.1" ry="2.1" fill="white"/>
  <circle  cx="13.7" cy="31" r="0.65" fill="#5B2D8E"/>
  <circle  cx="21.7" cy="31" r="0.65" fill="#5B2D8E"/>

  <!-- Nos -->
  <polygon points="17,35.5 15.5,37.5 18.5,37.5" fill="#5B2D8E"/>
  <line x1="17" y1="35.5" x2="17" y2="37.5" stroke="#5B2D8E" stroke-width="0.5"/>

  <!-- Usta -->
  <path d="M 15.5,37.5 Q 17,39 18.5,37.5"
        fill="none" stroke="#5B2D8E" stroke-width="0.6" stroke-linecap="round"/>

  <!-- Wąsy lewe -->
  <line x1="4.5" y1="35"   x2="12.5" y2="35.8" stroke="#5B2D8E" stroke-width="0.4"/>
  <line x1="4.5" y1="37"   x2="12.5" y2="37.2" stroke="#5B2D8E" stroke-width="0.4"/>
  <line x1="4.5" y1="39"   x2="12.5" y2="38.6" stroke="#5B2D8E" stroke-width="0.4"/>

  <!-- Wąsy prawe (skrócone żeby nie nachodziły na szydełko) -->
  <line x1="21.5" y1="35.8" x2="27.5" y2="35"   stroke="#5B2D8E" stroke-width="0.4"/>
  <line x1="21.5" y1="37.2" x2="27.5" y2="37"   stroke="#5B2D8E" stroke-width="0.4"/>
  <line x1="21.5" y1="38.6" x2="27.5" y2="39"   stroke="#5B2D8E" stroke-width="0.4"/>

  <!-- Kokardka na głowie -->
  <path d="M 13,23 Q 15.5,20.5 17,22.5 Q 18.5,20.5 21,23"
        fill="none" stroke="#5B2D8E" stroke-width="0.85" stroke-linecap="round"/>
  <circle cx="17" cy="22.5" r="1" fill="#5B2D8E"/>

  <!-- ─── SZYDEŁKO (trzonek x=31, y=21..45) ─── -->

  <!-- Trzonek -->
  <line x1="31" y1="28" x2="31" y2="43"
        stroke="#5B2D8E" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Haczyk (główka) -->
  <path d="M 31,28 Q 31,22.5 28,22.5 Q 26,22.5 26,24.5"
        fill="none" stroke="#5B2D8E" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Zadzior haczyka -->
  <path d="M 26,24.5 Q 25.5,26.5 27,27"
        fill="none" stroke="#5B2D8E" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Uchwyt ozdobny -->
  <rect x="29.8" y="41.5" width="2.4" height="5" rx="1" fill="#5B2D8E"/>
  <rect x="29.4" y="42.8" width="3.2" height="0.8" rx="0.4" fill="white"/>
  <rect x="29.4" y="44.3" width="3.2" height="0.8" rx="0.4" fill="white"/>

  <!-- Włóczka owijająca szydełko -->
  <path d="M 29,30 Q 27,32 29,34.5 Q 31,37 29,39 Q 27,41 29,43"
        fill="none" stroke="#5B2D8E" stroke-width="0.6" stroke-linecap="round"/>

  <!-- Kłębek włóczki pod szydełkiem -->
  <circle cx="28" cy="47" r="2" fill="none" stroke="#5B2D8E" stroke-width="0.5"/>
  <path d="M 26.2,46.2 Q 28,46.8 29.8,46.2" fill="none" stroke="#5B2D8E" stroke-width="0.4"/>
  <path d="M 26,47.8 Q 28,48.4 30,47.8"     fill="none" stroke="#5B2D8E" stroke-width="0.4"/>
  <!-- Nitka do szydełka -->
  <path d="M 29.8,45.5 Q 30.5,44 31,43"
        fill="none" stroke="#5B2D8E" stroke-width="0.4" stroke-dasharray="0.8,0.7"/>

  <!-- ─── TEKST ŚRODKOWY (center x=50, strefa x:34-66) ─── -->

  <!-- Ozdobniki -->
  <text x="50" y="25" font-size="3.5" fill="#5B2D8E" font-family="Arial, sans-serif"
        text-anchor="middle">✦ ✦ ✦</text>

  <!-- szydełkowe -->
  <text x="50" y="32"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="5" font-style="italic"
        fill="#5B2D8E" text-anchor="middle"
        textLength="26" lengthAdjust="spacingAndGlyphs">szydełkowe</text>

  <!-- cuda (duże, wyróżnione) -->
  <text x="50" y="39"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="7" font-weight="bold"
        fill="#5B2D8E" text-anchor="middle"
        textLength="22" lengthAdjust="spacingAndGlyphs">cuda</text>

  <!-- Linia dekoracyjna -->
  <line x1="36" y1="41" x2="64" y2="41" stroke="#5B2D8E" stroke-width="0.4"/>

  <!-- by Basia -->
  <text x="50" y="46.5"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="4.5" font-style="italic"
        fill="#5B2D8E" text-anchor="middle"
        textLength="24" lengthAdjust="spacingAndGlyphs">♡ by Basia ♡</text>

  <!-- ─── QR KOD PLACEHOLDER (strefa x:66-88) ─── -->

  <!-- Tło strefy QR (delikatne) -->
  <rect x="67" y="19.5" width="20" height="29" rx="1"
        fill="#5B2D8E" opacity="0.04"/>

  <!-- Ramka kodu QR -->
  <rect x="69" y="21" width="16" height="16" rx="1"
        fill="none" stroke="#5B2D8E" stroke-width="0.6"/>

  <!-- Trzy narożniki pozycjonujące QR -->
  <!-- Lewy górny -->
  <rect x="70" y="22"   width="4" height="4" rx="0.3" fill="none" stroke="#5B2D8E" stroke-width="0.55"/>
  <rect x="71" y="23"   width="2" height="2" fill="#5B2D8E"/>
  <!-- Prawy górny -->
  <rect x="80" y="22"   width="4" height="4" rx="0.3" fill="none" stroke="#5B2D8E" stroke-width="0.55"/>
  <rect x="81" y="23"   width="2" height="2" fill="#5B2D8E"/>
  <!-- Lewy dolny -->
  <rect x="70" y="30.5" width="4" height="4" rx="0.3" fill="none" stroke="#5B2D8E" stroke-width="0.55"/>
  <rect x="71" y="31.5" width="2" height="2" fill="#5B2D8E"/>

  <!-- Losowe piksele QR (wypełnienie środka) -->
  <rect x="75.5" y="22.5" width="1.2" height="1.2" fill="#5B2D8E"/>
  <rect x="77.5" y="22.5" width="1.2" height="1.2" fill="#5B2D8E"/>
  <rect x="76.5" y="24"   width="1.2" height="1.2" fill="#5B2D8E"/>
  <rect x="75.5" y="25.5" width="1.2" height="1.2" fill="#5B2D8E"/>
  <rect x="78"   y="25.5" width="1.2" height="1.2" fill="#5B2D8E"/>
  <rect x="76"   y="27"   width="1.2" height="1.2" fill="#5B2D8E"/>
  <rect x="78.5" y="28"   width="1.2" height="1.2" fill="#5B2D8E"/>
  <rect x="75.5" y="29.5" width="1.2" height="1.2" fill="#5B2D8E"/>
  <rect x="80.5" y="27"   width="1.2" height="1.2" fill="#5B2D8E"/>
  <rect x="82"   y="28.5" width="1.2" height="1.2" fill="#5B2D8E"/>
  <rect x="80.5" y="30"   width="1.2" height="1.2" fill="#5B2D8E"/>
  <rect x="82.5" y="31.5" width="1.2" height="1.2" fill="#5B2D8E"/>
  <rect x="75.5" y="31.5" width="1.2" height="1.2" fill="#5B2D8E"/>
  <rect x="77"   y="33"   width="1.2" height="1.2" fill="#5B2D8E"/>
  <rect x="79.5" y="33"   width="1.2" height="1.2" fill="#5B2D8E"/>

  <!-- Tekst pod placeholderem QR -->
  <text x="77" y="41.5"
        font-family="Arial, sans-serif" font-size="2.8"
        fill="#5B2D8E" text-anchor="middle">kocie-oczka.pl</text>

  <text x="77" y="46.5"
        font-family="Arial, sans-serif" font-size="2.2" font-style="italic"
        fill="#5B2D8E" text-anchor="middle" opacity="0.7">← zastąp swoim QR</text>

</svg>
